name: ORPMI — Full CI/CD Pipeline

on:
  push:
    branches: [main, develop, "release/*"]
  pull_request:
    branches: [main]

jobs:
  test-and-validate:
    runs-on: ubuntu-latest
    name: ETL · Validation · ML · Tests

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create Required Directories
        run: mkdir -p data/raw data/processed data/exports database logs models/artifacts

      - name: Stage 1 — Database Setup & ETL Pipeline
        run: python scripts/setup_database.py

      - name: Stage 1 — Verify Row Counts
        run: |
          python -c "
          import sys; sys.path.insert(0,'.')
          from database.db_connection import get_engine
          from sqlalchemy import text
          engine = get_engine()
          with engine.connect() as conn:
              tables = ['assets','asset_operating_data','failure_events',
                        'maintenance_records','kpi_daily_summary']
              for t in tables:
                  r = conn.execute(text(f'SELECT COUNT(*) FROM {t}')).scalar()
                  assert r > 0, f'{t} is empty'
                  print(f'{t}: {r:,} rows — OK')
          print('All tables verified.')
          " 2>/dev/null

      - name: Stage 2 — ML Pipeline (Feature Engineering + Training)
        run: python scripts/train_models.py

      - name: Stage 2 — Verify Model Artefacts
        run: |
          python -c "
          import json
          from pathlib import Path
          meta = json.loads(Path('models/artifacts/model_metadata.json').read_text())
          roc = meta['champion_test_roc_auc']
          print(f'Champion: {meta[\"champion_model\"]}')
          print(f'ROC-AUC: {roc:.4f}')
          assert roc >= 0.75, f'ROC-AUC {roc:.4f} below minimum threshold 0.75'
          print('Model validation: PASSED')
          "

      - name: Stage 3 — Full Test Suite (76 tests)
        run: python -m pytest tests/test_orpmi.py -v --tb=short

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: |
            logs/
            models/artifacts/model_metadata.json
          retention-days: 30

  docker-build:
    runs-on: ubuntu-latest
    name: Docker Build Verification
    needs: test-and-validate

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker Image
        run: docker build -t orpmi-platform:ci-${{ github.sha }} .

      - name: Verify Docker Image
        run: |
          docker images orpmi-platform:ci-${{ github.sha }}
          echo "Docker image built successfully."
